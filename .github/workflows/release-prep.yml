name: Release Prep

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to validate, for example 0.1.0 or v0.1.0
        required: true
        type: string
      npm_package_name:
        description: Expected npm package name
        required: true
        default: bindport
        type: string
      run_ci:
        description: Run the full local CI gate before package dry-runs
        required: true
        default: true
        type: boolean
      publish_ready:
        description: Enforce final npm publish readiness checks
        required: true
        default: false
        type: boolean

concurrency:
  group: release-prep-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release-prep:
    name: manual release prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.5.16
          sha256: fb2d7bf1a3751398a5c336a3565cd3c60af9b41952abe6fd62e2f2f0d5f06b60
          install: true
          install_args: --locked
          cache: true

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release prep dry-run
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          NPM_PACKAGE_NAME: ${{ inputs.npm_package_name }}
          RUN_CI: ${{ inputs.run_ci }}
          PUBLISH_READY: ${{ inputs.publish_ready }}
        run: scripts/release-prep.sh

      - name: Verify release prep did not change source
        run: git diff --exit-code
