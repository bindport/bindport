name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: linux ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.6
          sha256: b8c25ad5e1c178bb7ba1e0fca9066153f8ef1b28bf5a8456c20a8acd2522e556
          install: true
          install_args: --locked --jobs=4 rust node actionlint gitleaks trivy shellcheck
          cache: true

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Cargo-based CI tools
        run: mise install --locked --jobs=1 cargo:cargo-audit cargo:cargo-llvm-cov

      - name: Format
        run: mise run fmt

      - name: Clippy
        run: mise run clippy

      - name: Check platform cfg guards
        run: mise run platform-guard

      - name: Lint workflows
        run: mise run workflow-lint

      - name: Audit Rust dependencies
        if: ${{ !cancelled() }}
        run: mise run audit

      - name: Check dependency substitutions
        if: ${{ !cancelled() }}
        run: mise run dependency-guard

      - name: Scan for leaked secrets
        if: ${{ !cancelled() }}
        run: mise run secret-scan

      - name: Scan filesystem security posture
        if: ${{ !cancelled() }}
        run: mise run security-scan

      - name: Coverage
        run: mise run coverage

      - name: Build release binary
        run: mise run build

      - name: Validate cargo-binstall metadata
        run: mise run binstall-metadata

      - name: Smoke test npm wrapper
        run: mise run npm-smoke

  macos:
    name: macos compatibility
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup default 1.96.0

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke test npm wrapper
        run: scripts/npm-smoke.sh
