name: Release Check

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to validate, for example 0.1.0 or v0.1.0
        required: true
        type: string
      npm_package_name:
        description: Expected npm package name
        required: true
        default: bindport
        type: string
      run_ci:
        description: Run the full local CI gate before package dry-runs
        required: true
        default: true
        type: boolean
      publish_ready:
        description: Dry-run crates whose workspace dependencies are on crates.io
        required: true
        default: false
        type: boolean

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release-check:
    name: manual release check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
          sha256: dad54e0b843908324282b8673f9c0ebc3a4da0c49ad2da309a49bfbc918ba180
          install: true
          install_args: --locked --jobs=1
          cache: true

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release check
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          NPM_PACKAGE_NAME: ${{ inputs.npm_package_name }}
          RUN_CI: ${{ inputs.run_ci }}
          PUBLISH_READY: ${{ inputs.publish_ready }}
        run: scripts/release-check.sh

      - name: Verify release check did not change source
        run: git diff --exit-code
