name: Release Check

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to validate, for example 0.1.0 or v0.1.0
        required: true
        type: string
      npm_package_name:
        description: Expected npm package name
        required: true
        default: bindport
        type: string
      run_ci:
        description: Run the full local CI gate before package dry-runs
        required: true
        default: true
        type: boolean
      publish_ready:
        description: Run full crates.io publish dry-runs
        required: true
        default: false
        type: boolean

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release-check:
    name: manual release check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.6
          sha256: b8c25ad5e1c178bb7ba1e0fca9066153f8ef1b28bf5a8456c20a8acd2522e556
          install: true
          install_args: --locked --jobs=1
          cache: true

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release check
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          NPM_PACKAGE_NAME: ${{ inputs.npm_package_name }}
          RUN_CI: ${{ inputs.run_ci }}
          PUBLISH_READY: ${{ inputs.publish_ready }}
        run: scripts/release-check.sh

      - name: Verify release check did not change source
        run: git diff --exit-code
