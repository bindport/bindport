name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: linux ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.5.16
          sha256: fb2d7bf1a3751398a5c336a3565cd3c60af9b41952abe6fd62e2f2f0d5f06b60
          install: true
          install_args: --locked
          cache: true

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format
        run: mise run fmt

      - name: Clippy
        run: mise run clippy

      - name: Lint workflows
        run: mise run workflow-lint

      - name: Audit Rust dependencies
        if: ${{ !cancelled() }}
        run: mise run audit

      - name: Check dependency substitutions
        if: ${{ !cancelled() }}
        run: mise run dependency-guard

      - name: Scan for leaked secrets
        if: ${{ !cancelled() }}
        run: mise run secret-scan

      - name: Scan filesystem security posture
        if: ${{ !cancelled() }}
        run: mise run security-scan

      - name: Test
        run: mise run test

      - name: Build release binary
        run: mise run build

  macos:
    name: macos compatibility
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup default 1.96.0

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Build release binary
        run: cargo build --release --locked
