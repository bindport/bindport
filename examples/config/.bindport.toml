project = "example-app"
service = "web"
default_range = "29000-29999"
skip_ports = [29000, 29070, 29118, 29167, 29168, 29169, 29900, 29901, 29920, 29999]

[dashboard]
host = "127.0.0.1"
port = 27080
allowed_hosts = ["localhost", "127.0.0.1"]

[dashboard.auth]
required = false
token_env = "BINDPORT_DASHBOARD_TOKEN"

[identity]
strategy = "git-worktree"

[[services]]
name = "web"
command = "next dev"
env.PORT = "{port}"
env.HOSTNAME = "0.0.0.0"
env.NEXT_PUBLIC_BINDPORT_URL = "{route_url}"
hostname = "{branch}.{project}.localhost"
health_url = "http://127.0.0.1:{port}/"

[proxy.traefik]
enabled = true
directory = "/path/to/traefik/dynamic/bindport"
entrypoint = "websecure"
