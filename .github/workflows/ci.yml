name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: linux ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.6
          sha256: b8c25ad5e1c178bb7ba1e0fca9066153f8ef1b28bf5a8456c20a8acd2522e556
          install: true
          install_args: --locked --jobs=4 rust node actionlint gitleaks trivy shellcheck
          cache: true

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Cargo-based CI tools
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          curl -fsSLo "$tmp/cargo-audit.tgz" https://github.com/rustsec/rustsec/releases/download/cargo-audit/v0.22.2/cargo-audit-x86_64-unknown-linux-gnu-v0.22.2.tgz
          echo "ab28a1bdb54db4d5d8ad5981cf1f959410370b3d28250dbd35f6a44248620e39  $tmp/cargo-audit.tgz" | sha256sum -c -
          tar -xzf "$tmp/cargo-audit.tgz" -C "$tmp"
          install -m 0755 "$tmp/cargo-audit-x86_64-unknown-linux-gnu-v0.22.2/cargo-audit" "$HOME/.cargo/bin/cargo-audit"

          curl -fsSLo "$tmp/cargo-llvm-cov.tar.gz" https://github.com/taiki-e/cargo-llvm-cov/releases/download/v0.8.7/cargo-llvm-cov-x86_64-unknown-linux-gnu.tar.gz
          echo "9a75fe29538d3800b3da57f6f6efb64cba5c720a257bf0cb8b51f39d495a9168  $tmp/cargo-llvm-cov.tar.gz" | sha256sum -c -
          tar -xzf "$tmp/cargo-llvm-cov.tar.gz" -C "$tmp"
          install -m 0755 "$tmp/cargo-llvm-cov" "$HOME/.cargo/bin/cargo-llvm-cov"

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check platform cfg guards
        run: cargo run -p xtask -- platform-guard

      - name: Lint workflows
        run: actionlint

      - name: Audit Rust dependencies
        if: ${{ !cancelled() }}
        run: cargo audit

      - name: Check dependency substitutions
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail

          for package in zmij yaml_serde libyaml-rs; do
            if cargo tree --locked -p "$package" >/dev/null 2>&1; then
              echo "banned dependency present: $package" >&2
              exit 1
            fi
          done

          for package in ryu serde_yaml_ng unsafe-libyaml; do
            if ! cargo tree --locked -p "$package" >/dev/null 2>&1; then
              echo "required dependency missing: $package" >&2
              exit 1
            fi
          done

      - name: Scan for leaked secrets
        if: ${{ !cancelled() }}
        run: gitleaks detect --source . --redact --no-banner

      - name: Scan filesystem security posture
        if: ${{ !cancelled() }}
        run: trivy fs --scanners vuln,misconfig --severity HIGH,CRITICAL --exit-code 1 --skip-dirs target --skip-dirs .git --no-progress .

      - name: Coverage
        run: cargo llvm-cov --workspace --all-targets --summary-only --fail-under-lines 90 --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Validate cargo-binstall metadata
        run: node scripts/check-binstall-metadata.js

      - name: Validate CLI release assets
        run: scripts/check-cli-assets.sh

      - name: Validate Homebrew formula generation
        run: scripts/check-homebrew-formula.sh

      - name: Smoke test npm wrapper
        run: scripts/npm-smoke.sh

  macos:
    name: macos compatibility
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup default 1.96.0

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke test npm wrapper
        run: scripts/npm-smoke.sh
