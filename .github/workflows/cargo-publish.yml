name: Cargo Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish, for example 0.1.0 or v0.1.0
        required: true
        type: string
      execute:
        description: Publish to crates.io after the dry-run succeeds
        required: true
        default: false
        type: boolean

concurrency:
  group: cargo-publish-${{ inputs.version }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  dry-run:
    name: cargo publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.5.16
          sha256: fb2d7bf1a3751398a5c336a3565cd3c60af9b41952abe6fd62e2f2f0d5f06b60
          install: true
          install_args: --locked
          cache: true

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Dry-run Cargo publish
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: scripts/cargo-publish.sh --version "$RELEASE_VERSION" --dry-run

      - name: Verify dry-run did not change source
        run: git diff --exit-code

  publish:
    name: cargo publish
    if: ${{ inputs.execute }}
    needs: dry-run
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.5.16
          sha256: fb2d7bf1a3751398a5c336a3565cd3c60af9b41952abe6fd62e2f2f0d5f06b60
          install: true
          install_args: --locked
          cache: true

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Publish Cargo packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: scripts/cargo-publish.sh --version "$RELEASE_VERSION" --execute --yes
