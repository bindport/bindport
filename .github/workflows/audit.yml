name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0

      - name: Install cargo-audit
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          curl -fsSLo "$tmp/cargo-audit.tgz" https://github.com/rustsec/rustsec/releases/download/cargo-audit/v0.22.2/cargo-audit-x86_64-unknown-linux-gnu-v0.22.2.tgz
          echo "ab28a1bdb54db4d5d8ad5981cf1f959410370b3d28250dbd35f6a44248620e39  $tmp/cargo-audit.tgz" | sha256sum -c -
          tar -xzf "$tmp/cargo-audit.tgz" -C "$tmp"
          install -m 0755 "$tmp/cargo-audit-x86_64-unknown-linux-gnu-v0.22.2/cargo-audit" "$HOME/.cargo/bin/cargo-audit"

      - name: Audit Rust dependencies
        run: cargo audit
