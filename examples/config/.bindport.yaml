project: example-app
service: web
default_range: 29000-29999
skip_ports:
  - 29000
  - 29070
  - 29118
  - 29167
  - 29168
  - 29169
  - 29900
  - 29901
  - 29920
  - 29999
dashboard:
  host: 127.0.0.1
  port: 27080
  register_service: false
  allowed_hosts:
    - localhost
    - 127.0.0.1
  auth:
    required: false
    token_env: BINDPORT_DASHBOARD_TOKEN
output_defaults:
  root: .bindport/generated
  target_host: 127.0.0.1
  target_scheme: http
  auto_render: true
  delete_on:
    - removed
  on_failure: warn
  debounce_ms: 250
services:
  - name: web
    path: .
    command:
      - next
      - dev
    env:
      PORT: "{port}"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_BINDPORT_URL: "{route_url}"
    hostname: "{branch}.{project}.localhost"
    health_url: "http://127.0.0.1:{port}/"
outputs:
  - name: traefik
    template: bindport-traefik
    target: traefik/{{ route.slug }}.yml
    vars:
      entrypoints:
        - web
      tls: false
      middlewares: []
