[settings]
lockfile = true

[tools]
# `default` rustup profile is NOT used; mise installs minimal. rustfmt and
# clippy are needed by local checks and CI.
rust = { version = "1.96.0", components = "rustfmt,clippy" }
node = "26.3.0"
"cargo:cargo-audit" = "0.22.2"
"cargo:cargo-edit" = "0.13.11"
actionlint = "1.7.12"
gitleaks = "8.30.1"
trivy = "0.71.0"
watchexec = "2.5.1"
# actionlint shells out to shellcheck for `run:` blocks. Pin it so local
# workflow linting matches CI.
shellcheck = "0.11.0"

[tasks.fmt]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run Rust lints"
run = "cargo clippy --all-targets -- -D warnings"

[tasks.platform-guard]
description = "Catch platform-cfg patterns Linux clippy misses"
run = "python3 scripts/check-platform-cfg-guards.py"

[tasks.test]
description = "Run all Rust tests"
run = "cargo test --all-targets"

[tasks.check]
description = "Run fast Rust type checks"
run = "cargo check --all-targets"

[tasks.build]
description = "Build the release binary"
run = "cargo build --release --locked"

[tasks.dev-dashboard]
description = "Run the dashboard with local assets and restart on Rust changes"
run = "BINDPORT_DASHBOARD_STATIC_DIR=crates/bindport-dashboard/static watchexec --restart --clear --watch Cargo.toml --watch Cargo.lock --watch crates/bindport/Cargo.toml --watch crates/bindport/src --watch crates/bindport-adapters/Cargo.toml --watch crates/bindport-adapters/src --watch crates/bindport-core/Cargo.toml --watch crates/bindport-core/src --watch crates/bindport-dashboard/Cargo.toml --watch crates/bindport-dashboard/src --watch crates/bindport-registry/Cargo.toml --watch crates/bindport-registry/src --watch crates/bindport-runner/Cargo.toml --watch crates/bindport-runner/src -- cargo run -p bindport -- dashboard serve --static-dir crates/bindport-dashboard/static"

[tasks.dev-dashboard-static]
description = "Run the dashboard with static asset reload only"
run = "BINDPORT_DASHBOARD_STATIC_DIR=crates/bindport-dashboard/static cargo run -p bindport -- dashboard serve --static-dir crates/bindport-dashboard/static"

[tasks.dev-dashboard-watch]
description = "Alias for dev-dashboard"
run = "mise run dev-dashboard"

[tasks.dev-dashboard-remote]
description = "Run a remotely reachable dashboard with token auth and Rust restarts"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [[ -z "${BINDPORT_DASHBOARD_TOKEN:-}" ]]; then
  echo "set BINDPORT_DASHBOARD_TOKEN before running remote dashboard dev" >&2
  exit 1
fi

BINDPORT_DASHBOARD_STATIC_DIR=crates/bindport-dashboard/static \
  watchexec --restart --clear \
    --watch Cargo.toml \
    --watch Cargo.lock \
    --watch crates/bindport/Cargo.toml \
    --watch crates/bindport/src \
    --watch crates/bindport-adapters/Cargo.toml \
    --watch crates/bindport-adapters/src \
    --watch crates/bindport-core/Cargo.toml \
    --watch crates/bindport-core/src \
    --watch crates/bindport-dashboard/Cargo.toml \
    --watch crates/bindport-dashboard/src \
    --watch crates/bindport-registry/Cargo.toml \
    --watch crates/bindport-registry/src \
    --watch crates/bindport-runner/Cargo.toml \
    --watch crates/bindport-runner/src \
    -- \
  cargo run -p bindport -- dashboard serve \
    --host 0.0.0.0 \
    --auth required \
    --token-env BINDPORT_DASHBOARD_TOKEN \
    --static-dir crates/bindport-dashboard/static
'''

[tasks.dev-dashboard-remote-static]
description = "Run a remotely reachable dashboard without Rust restarts"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [[ -z "${BINDPORT_DASHBOARD_TOKEN:-}" ]]; then
  echo "set BINDPORT_DASHBOARD_TOKEN before running remote dashboard dev" >&2
  exit 1
fi

BINDPORT_DASHBOARD_STATIC_DIR=crates/bindport-dashboard/static \
  cargo run -p bindport -- dashboard serve \
    --host 0.0.0.0 \
    --auth required \
    --token-env BINDPORT_DASHBOARD_TOKEN \
    --static-dir crates/bindport-dashboard/static
'''

[tasks.release-prep]
description = "Create a release prep branch, version bump commit, and PR"
usage = '''
arg "[request]" help="patch, minor, major, vX.Y.Z, or X.Y.Z" default="patch"
'''
run = 'scripts/release-prep.sh "${usage_request?}"'

[tasks.release-check]
description = "Validate a release checkout without publishing"
usage = '''
arg "<version>" help="Release version to validate, for example 0.1.0 or v0.1.0"
flag "--npm-package-name <name>" help="Expected npm package name" default="bindport"
flag "--skip-ci" help="Skip the full local CI gate"
flag "--allow-dirty" help="Allow release-prep version bump changes"
flag "--publish-ready" help="Run full crates.io publish dry-runs"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

args=(
  --version "${usage_version?}"
  --npm-package-name "${usage_npm_package_name?}"
)
if [[ "${usage_skip_ci:-false}" == "true" ]]; then
  args+=(--skip-ci)
fi
if [[ "${usage_allow_dirty:-false}" == "true" ]]; then
  args+=(--allow-dirty)
fi
if [[ "${usage_publish_ready:-false}" == "true" ]]; then
  args+=(--publish-ready)
fi
scripts/release-check.sh "${args[@]}"
'''

[tasks.release-publish]
description = "Dispatch the stable release workflow for the current version"
usage = '''
arg "[version]" help="Stable release version, for example 0.1.0 or v0.1.0"
flag "--dry-run" help="Verify without tagging or creating a GitHub release"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

args=()
if [[ "${usage_dry_run:-false}" == "true" ]]; then
  args+=(--dry-run)
fi
if [[ -n "${usage_version:-}" ]]; then
  args+=("${usage_version}")
fi
scripts/release-publish.sh "${args[@]}"
'''

[tasks.cargo-publish]
description = "Dry-run or execute crates.io publishing in workspace order"
usage = '''
arg "[version]" help="Release version to publish, for example 0.1.0 or v0.1.0"
flag "--execute" help="Actually publish to crates.io"
flag "--allow-dirty" help="Allow dirty dry-runs"
flag "--wait-seconds <n>" help="Seconds to wait between real publishes"
flag "--yes" help="Skip the interactive publish confirmation"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

args=()
if [[ -n "${usage_version:-}" ]]; then
  args+=("${usage_version}")
fi
if [[ "${usage_execute:-false}" == "true" ]]; then
  args+=(--execute)
fi
if [[ "${usage_allow_dirty:-false}" == "true" ]]; then
  args+=(--allow-dirty)
fi
if [[ -n "${usage_wait_seconds:-}" ]]; then
  args+=(--wait-seconds "${usage_wait_seconds}")
fi
if [[ "${usage_yes:-false}" == "true" ]]; then
  args+=(--yes)
fi
scripts/cargo-publish.sh "${args[@]}"
'''

[tasks.workflow-lint]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks.audit]
description = "Scan Rust dependencies for security advisories"
run = "cargo audit"

[tasks.dependency-guard]
description = "Check for banned dependency substitutions and canonical parser crates"
run = "for package in zmij yaml_serde libyaml-rs; do if cargo tree --locked -p \"$package\" >/dev/null 2>&1; then echo \"banned dependency present: $package\" >&2; exit 1; fi; done; for package in ryu serde_yaml_ng unsafe-libyaml; do if ! cargo tree --locked -p \"$package\" >/dev/null 2>&1; then echo \"required dependency missing: $package\" >&2; exit 1; fi; done"

[tasks.secret-scan]
description = "Scan committed history for leaked secrets"
run = "gitleaks detect --source . --redact --no-banner"

[tasks.security-scan]
description = "Scan the filesystem for high-severity vulnerabilities and misconfigurations"
run = "trivy fs --scanners vuln,misconfig --severity HIGH,CRITICAL --exit-code 1 --skip-dirs target --skip-dirs .git --no-progress ."

[tasks.ci]
description = "Run the main local CI checks"
depends = [
    "fmt",
    "clippy",
    "platform-guard",
    "workflow-lint",
    "audit",
    "dependency-guard",
    "secret-scan",
    "security-scan",
    "test",
    "build",
]
