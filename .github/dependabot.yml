version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "serde_json"
        versions:
          - ">= 1.0.147"
    groups:
      cargo-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/npm/bindport"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps"
    groups:
      npm-dependencies:
        patterns:
          - "*"
