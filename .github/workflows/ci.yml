name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: linux ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.6
          sha256: b8c25ad5e1c178bb7ba1e0fca9066153f8ef1b28bf5a8456c20a8acd2522e556
          install: true
          install_args: --locked
          cache: true

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format
        run: mise run fmt

      - name: Clippy
        run: mise run clippy

      - name: Lint workflows
        run: mise run workflow-lint

      - name: Audit Rust dependencies
        if: ${{ !cancelled() }}
        run: mise run audit

      - name: Check dependency substitutions
        if: ${{ !cancelled() }}
        run: mise run dependency-guard

      - name: Scan for leaked secrets
        if: ${{ !cancelled() }}
        run: mise run secret-scan

      - name: Scan filesystem security posture
        if: ${{ !cancelled() }}
        run: mise run security-scan

      - name: Test
        run: mise run test

      - name: Build release binary
        run: mise run build

  macos:
    name: macos compatibility
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy
          rustup default 1.96.0

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Build release binary
        run: cargo build --release --locked
