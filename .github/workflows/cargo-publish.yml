name: Cargo Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish, for example 0.1.0 or v0.1.0
        required: true
        type: string
      execute:
        description: Publish to crates.io after the dry-run succeeds
        required: true
        default: false
        type: boolean

concurrency:
  group: cargo-publish-${{ inputs.version }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  dry-run:
    name: cargo publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
          sha256: dad54e0b843908324282b8673f9c0ebc3a4da0c49ad2da309a49bfbc918ba180
          install: true
          install_args: --locked --jobs=1
          cache: true

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Dry-run Cargo publish
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: scripts/cargo-publish.sh --version "$RELEASE_VERSION" --dry-run

      - name: Verify dry-run did not change source
        run: git diff --exit-code

  publish:
    name: cargo publish
    if: ${{ inputs.execute }}
    needs: dry-run
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
          sha256: dad54e0b843908324282b8673f9c0ebc3a4da0c49ad2da309a49bfbc918ba180
          install: true
          install_args: --locked --jobs=1
          cache: true

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Publish Cargo packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: scripts/cargo-publish.sh --version "$RELEASE_VERSION" --execute --yes
