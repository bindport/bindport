name: npm Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish, for example 0.4.0 or v0.4.0
        required: true
        type: string
      execute:
        description: Publish to npm after the dry-run succeeds
        required: true
        default: false
        type: boolean

concurrency:
  group: npm-publish-${{ inputs.version }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dry-run:
    name: npm publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
          sha256: dad54e0b843908324282b8673f9c0ebc3a4da0c49ad2da309a49bfbc918ba180
          install: true
          install_args: --locked --jobs=1
          cache: true

      - name: Download npm release tarballs
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION#v}"
          gh release download "v$version" --pattern "*.tgz" --dir dist/npm
          gh release download "v$version" --pattern "*.tgz.sha256" --dir dist/npm

      - name: Dry-run npm publish
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: scripts/npm-publish.sh --version "$RELEASE_VERSION" --dist dist/npm --yes

  publish:
    name: npm publish
    if: ${{ inputs.execute }}
    needs: dry-run
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.12
          sha256: dad54e0b843908324282b8673f9c0ebc3a4da0c49ad2da309a49bfbc918ba180
          install: true
          install_args: --locked --jobs=1
          cache: true

      - name: Download npm release tarballs
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION#v}"
          gh release download "v$version" --pattern "*.tgz" --dir dist/npm
          gh release download "v$version" --pattern "*.tgz.sha256" --dir dist/npm

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "NPM_TOKEN is required for npm publishing" >&2
            exit 1
          fi
          npm_config_userconfig="$RUNNER_TEMP/.npmrc"
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$npm_config_userconfig"
          echo "NPM_CONFIG_USERCONFIG=$npm_config_userconfig" >> "$GITHUB_ENV"

      - name: Publish npm packages
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          NPM_CONFIG_PROVENANCE: "true"
        run: scripts/npm-publish.sh --version "$RELEASE_VERSION" --dist dist/npm --execute --yes
